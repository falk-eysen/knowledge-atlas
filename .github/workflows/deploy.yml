name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout atlas
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v5
          path: .quartz-build/quartz

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .quartz-build/quartz/package-lock.json

      - name: Stage public atlas content
        run: |
          mkdir -p .quartz-build/quartz/content
          cp index.md README.md map.md .quartz-build/quartz/content/
          mkdir -p .quartz-build/quartz/content/_wiki
          cp _wiki/index.md _wiki/log.md .quartz-build/quartz/content/_wiki/
          for section in concepts references claims maps playbooks patterns learning_paths projects areas themes open_questions; do
            if [ -d "_wiki/$section" ] && find "_wiki/$section" -type f -name '*.md' ! -name 'index.md' ! -name '*.draft.md' ! -name '*.private.md' | grep -q .; then
              cp -R "_wiki/$section" ".quartz-build/quartz/content/$section"
            fi
          done
          if [ -d _outputs ] && find _outputs -type f -name '*.md' ! -name 'index.md' ! -name '*.draft.md' ! -name '*.private.md' | grep -q .; then
            cp -R _outputs .quartz-build/quartz/content/
          fi
          cp quartz.config.yaml .quartz-build/quartz/quartz.config.yaml
          if [ -f quartz/styles/custom.scss ]; then cp quartz/styles/custom.scss .quartz-build/quartz/quartz/styles/custom.scss; fi

      - name: Install Quartz dependencies
        working-directory: .quartz-build/quartz
        run: npm ci

      - name: Install Quartz plugins
        working-directory: .quartz-build/quartz
        run: npx quartz plugin install --from-config

      - name: Build Quartz
        working-directory: .quartz-build/quartz
        run: npx quartz build --baseDir /knowledge-atlas

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz-build/quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
